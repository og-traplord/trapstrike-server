document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

',sans-serif; font-weight:700; font-size:18px; color:#0c0b0e; letter-spacing:-0.02em;\">TS<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:1px;\">\n        <span style=\"font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:16px; letter-spacing:0.02em; color:#f4f2f7;\">TRAPSTRIKE<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:#807d88;\">Backend Architecture<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav style=\"display:flex; flex-direction:column; gap:2px;\">\n      <a href=\"#challenge\" data-nav=\"challenge\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">01<\u002Fspan><span>The Constraint<\u002Fspan><\u002Fa>\n      <a href=\"#topology\" data-nav=\"topology\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">02<\u002Fspan><span>System Topology<\u002Fspan><\u002Fa>\n      <a href=\"#transport\" data-nav=\"transport\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">03<\u002Fspan><span>Transport Layer<\u002Fspan><\u002Fa>\n      <a href=\"#netcode\" data-nav=\"netcode\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">04<\u002Fspan><span>Netcode Model<\u002Fspan><\u002Fa>\n      <a href=\"#tick\" data-nav=\"tick\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">05<\u002Fspan><span>Server Tick Loop<\u002Fspan><\u002Fa>\n      <a href=\"#packets\" data-nav=\"packets\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">06<\u002Fspan><span>Packet Design<\u002Fspan><\u002Fa>\n      <a href=\"#anticheat\" data-nav=\"anticheat\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">07<\u002Fspan><span>Anti-Cheat<\u002Fspan><\u002Fa>\n      <a href=\"#lifecycle\" data-nav=\"lifecycle\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">08<\u002Fspan><span>Match Lifecycle<\u002Fspan><\u002Fa>\n      <a href=\"#stack\" data-nav=\"stack\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">09<\u002Fspan><span>Tech Stack<\u002Fspan><\u002Fa>\n      <a href=\"#deploy\" data-nav=\"deploy\" style=\"display:flex; gap:12px; align-items:center; padding:9px 12px; border-radius:9px; text-decoration:none; color:#8e8b96; font-size:14px; border-left:2px solid transparent; transition:all .15s;\"><span data-num=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5d5a64; width:18px;\">10<\u002Fspan><span>Deploy &amp; Scale<\u002Fspan><\u002Fa>\n    <\u002Fnav>\n\n    <div style=\"margin-top:auto; padding:12px; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);\">\n      <div style=\"display:flex; align-items:center; gap:7px; margin-bottom:7px;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent,#e8763c); animation:blink 1.8s infinite;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#9a97a3;\">Target Profile<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; line-height:1.7; color:#7d7a85;\">5v5 · {{ tickRate }}Hz tick<br>Server-authoritative<br>Hobby → scalable<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ============ MAIN ============ -->\n  <main style=\"margin-left:264px; flex:1; min-width:0; padding:0 7vw 140px; position:relative;\">\n    <div style=\"position:absolute; top:0; left:0; right:0; height:420px; background:radial-gradient(70% 100% at 30% 0%, rgba(232,118,60,0.10), transparent 70%); pointer-events:none;\"><\u002Fdiv>\n\n    <div style=\"max-width:880px; margin:0 auto; position:relative;\">\n\n      <!-- HERO -->\n      <header style=\"padding:72px 0 56px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent,#e8763c); margin-bottom:18px;\">System Design · Multiplayer · v1<\u002Fdiv>\n        <h1 style=\"font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:54px; line-height:1.04; letter-spacing:-0.02em; color:#f6f4f9; margin:0 0 20px; text-wrap:balance;\">A server-authoritative backend for a browser 5v5 FPS<\u002Fh1>\n        <p style=\"font-size:18px; line-height:1.65; color:#a8a5b0; max-width:64ch; margin:0 0 28px;\">TrapStrike runs in the browser on WebGL — which removes the easy netcode options and forces a few hard, correct choices. This is the architecture: how the client and server split responsibility, how latency gets hidden, how hits get decided fairly, and how to ship it on one box first.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n          <span style=\"display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#cdcad4;\">WebTransport + WS fallback<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#cdcad4;\">Node.js + TypeScript<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#cdcad4;\">{{ tickRate }}Hz sim · {{ snapshotRate }}Hz snapshots<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#cdcad4;\">1 process / match<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- TL;DR -->\n      <div style=\"background:linear-gradient(180deg, rgba(232,118,60,0.10), rgba(232,118,60,0.02)); border:1px solid rgba(232,118,60,0.30); border-radius:18px; padding:26px 28px; margin-bottom:96px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent,#e8763c); margin-bottom:16px;\">▮ Recommended stack — TL;DR<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(2, 1fr); gap:18px 32px;\">\n          <div><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:#f2f0f5; margin-bottom:4px;\">Authority<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.6; color:#a8a5b0;\">Server simulates everything. The client only sends <em style=\"color:#cdcad4; font-style:normal;\">intent<\u002Fem> and renders a prediction.<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:#f2f0f5; margin-bottom:4px;\">Transport<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.6; color:#a8a5b0;\">WebTransport unreliable datagrams for state; reliable streams for events. WebSocket fallback.<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:#f2f0f5; margin-bottom:4px;\">Latency hiding<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.6; color:#a8a5b0;\">Prediction + reconciliation for you, interpolation for everyone else, lag comp for hits.<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:#f2f0f5; margin-bottom:4px;\">Deploy<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.6; color:#a8a5b0;\">One VPS, Docker, one game-server process per match. Grow into an orchestrator later.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 01 CONSTRAINT -->\n      <section id=\"challenge\" data-section=\"challenge\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">01<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">The Constraint<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">A browser FPS removes the easy options<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 28px;\">Native FPS games send raw UDP and trust nothing. The browser can't open a UDP socket and a competitive game can't trust the client — those two facts shape every decision below. Three principles fall out of it:<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px;\">\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:10px;\">01 / TRANSPORT<\u002Fdiv>\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">No raw UDP<\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; line-height:1.6; color:#a09da8;\">Only WebSocket, WebRTC, or WebTransport are available. The job is to get UDP-like behavior on top of one of them.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:10px;\">02 / TRUST<\u002Fdiv>\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">Never trust the client<\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; line-height:1.6; color:#a09da8;\">JS is fully inspectable. Positions, hits and deaths must be decided on the server, or the game gets cheated on day one.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:10px;\">03 / LATENCY<\u002Fdiv>\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">Hide latency, don't remove it<\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; line-height:1.6; color:#a09da8;\">You can't beat the speed of light. The client predicts and interpolates so 60ms RTT feels instant.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:26px 0 0;\">The result is a <strong style=\"color:#e6e4ea; font-weight:600;\">thin-client / fat-server<\u002Fstrong> split. The browser renders, samples input, and guesses what happens next. The server is the single source of truth — everything the player sees is provisional until a snapshot confirms it.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 02 TOPOLOGY -->\n      <section id=\"topology\" data-section=\"topology\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">02<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">System Topology<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">Who talks to whom<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 30px;\">Five layers. The hot path is the top three — client, transport, game-server process. Orchestration and state sit beside the match and never touch the per-tick loop.<\u002Fp>\n\n        <!-- diagram -->\n        <div style=\"display:flex; flex-direction:column; align-items:stretch;\">\n          <!-- client -->\n          <div style=\"background:#15171c; border:1px solid rgba(63,176,191,0.32); border-radius:14px; padding:18px 20px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.04em; color:var(--accent2,#3fb0bf);\">CLIENT · BROWSER<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7d7a85;\">WebGL · ~16ms frame<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#bcb9c4;\">Renderer<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#bcb9c4;\">Input sampler<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#bcb9c4;\">Prediction<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#bcb9c4;\">Interpolation buffer<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:center; align-items:center; gap:14px; padding:8px 0; color:#6b6873; font-family:'IBM Plex Mono',monospace; font-size:11px;\"><span>InputCmd ▲<\u002Fspan><span style=\"color:var(--accent,#e8763c); font-size:16px;\">⇅<\u002Fspan><span>▼ Snapshot<\u002Fspan><\u002Fdiv>\n          <!-- transport -->\n          <div style=\"background:#121116; border:1px dashed rgba(255,255,255,0.18); border-radius:14px; padding:16px 20px; text-align:center;\">\n            <span style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:14px; letter-spacing:0.04em; color:#d6d3dd;\">TRANSPORT<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#8e8b96;\"> &nbsp;—&nbsp; WebTransport (QUIC / UDP) &nbsp;·&nbsp; WebSocket fallback (TCP)<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:center; color:var(--accent,#e8763c); font-size:18px; padding:6px 0;\">▼<\u002Fdiv>\n          <!-- game server -->\n          <div style=\"background:#15171c; border:1px solid rgba(232,118,60,0.40); border-radius:14px; padding:18px 20px; box-shadow:0 0 0 1px rgba(232,118,60,0.06), 0 18px 50px -28px rgba(232,118,60,0.5);\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px;\"><span style=\"font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.04em; color:var(--accent,#e8763c);\">GAME SERVER · 1 PROCESS / MATCH<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7d7a85;\">authoritative · {{ tickRate }}Hz<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:7px;\">\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(232,118,60,0.10); border:1px solid rgba(232,118,60,0.22); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#e9c4ab;\">Connection handler<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(232,118,60,0.10); border:1px solid rgba(232,118,60,0.22); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#e9c4ab;\">Input jitter buffer<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(232,118,60,0.10); border:1px solid rgba(232,118,60,0.22); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#e9c4ab;\">Authoritative sim<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(232,118,60,0.10); border:1px solid rgba(232,118,60,0.22); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#e9c4ab;\">Lag-comp rewind<\u002Fspan>\n              <span style=\"padding:5px 10px; border-radius:7px; background:rgba(232,118,60,0.10); border:1px solid rgba(232,118,60,0.22); font-family:'IBM Plex Mono',monospace; font-size:12px; color:#e9c4ab;\">Snapshot / delta encoder<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:center; color:#6b6873; font-size:18px; padding:6px 0;\">▼<\u002Fdiv>\n          <!-- support row -->\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n            <div style=\"background:#141318; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:16px 18px;\">\n              <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:14px; color:#d6d3dd; margin-bottom:8px;\">ORCHESTRATION<\u002Fdiv>\n              <p style=\"margin:0; font-size:13px; line-height:1.6; color:#9a97a3;\">Match Manager allocates a server process per match · Matchmaker / lobby groups 10 players · health checks.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#141318; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:16px 18px;\">\n              <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:14px; color:#d6d3dd; margin-bottom:8px;\">STATE<\u002Fdiv>\n              <p style=\"margin:0; font-size:13px; line-height:1.6; color:#9a97a3;\">Redis for sessions, presence &amp; matchmaking queue · Postgres for accounts &amp; stats (optional at hobby scale).<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15px; line-height:1.7; color:#9a97a3; max-width:64ch; margin:24px 0 0; padding-left:16px; border-left:2px solid var(--accent,#e8763c);\">The <strong style=\"color:#cdcad4; font-weight:600;\">room model<\u002Fstrong> is the key idea: each match is its own isolated process holding the full world state in memory. No shared game state, no database in the loop — a crash takes down one match, never the fleet.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 03 TRANSPORT -->\n      <section id=\"transport\" data-section=\"transport\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">03<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Transport Layer<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">WebTransport, with a WebSocket fallback<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 28px;\">The transport question is the whole web-FPS problem in miniature. The issue with TCP (WebSocket) is <em style=\"color:#cdcad4; font-style:normal;\">head-of-line blocking<\u002Fem>: one dropped packet stalls every packet behind it, which for state updates means a freeze. You want to drop stale state and keep moving.<\u002Fp>\n\n        <div style=\"overflow-x:auto; border:1px solid rgba(255,255,255,0.08); border-radius:14px; margin-bottom:24px;\">\n          <table style=\"width:100%; border-collapse:collapse; font-size:13.5px; min-width:560px;\">\n            <thead>\n              <tr style=\"background:rgba(255,255,255,0.03);\">\n                <th style=\"text-align:left; padding:13px 16px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#807d88; font-weight:500;\"><\u002Fth>\n                <th style=\"text-align:left; padding:13px 16px; font-family:'Chakra Petch',sans-serif; color:#cdcad4; font-weight:600;\">WebSocket<\u002Fth>\n                <th style=\"text-align:left; padding:13px 16px; font-family:'Chakra Petch',sans-serif; color:#cdcad4; font-weight:600;\">WebRTC Data<\u002Fth>\n                <th style=\"text-align:left; padding:13px 16px; font-family:'Chakra Petch',sans-serif; color:var(--accent,#e8763c); font-weight:600;\">WebTransport ★<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody style=\"color:#a8a5b0;\">\n              <tr style=\"border-top:1px solid rgba(255,255,255,0.06);\"><td style=\"padding:12px 16px; color:#807d88; font-family:'IBM Plex Mono',monospace; font-size:12px;\">Underlying<\u002Ftd><td style=\"padding:12px 16px;\">TCP<\u002Ftd><td style=\"padding:12px 16px;\">UDP (SCTP)<\u002Ftd><td style=\"padding:12px 16px; color:#d6d3dd;\">UDP (QUIC/HTTP3)<\u002Ftd><\u002Ftr>\n              <tr style=\"border-top:1px solid rgba(255,255,255,0.06);\"><td style=\"padding:12px 16px; color:#807d88; font-family:'IBM Plex Mono',monospace; font-size:12px;\">Unreliable mode<\u002Ftd><td style=\"padding:12px 16px; color:#c77;\">No<\u002Ftd><td style=\"padding:12px 16px;\">Yes<\u002Ftd><td style=\"padding:12px 16px; color:#7fc99a;\">Yes (datagrams)<\u002Ftd><\u002Ftr>\n              <tr style=\"border-top:1px solid rgba(255,255,255,0.06);\"><td style=\"padding:12px 16px; color:#807d88; font-family:'IBM Plex Mono',monospace; font-size:12px;\">HoL blocking<\u002Ftd><td style=\"padding:12px 16px; color:#c77;\">Yes — stalls<\u002Ftd><td style=\"padding:12px 16px; color:#7fc99a;\">No<\u002Ftd><td style=\"padding:12px 16px; color:#7fc99a;\">No<\u002Ftd><\u002Ftr>\n              <tr style=\"border-top:1px solid rgba(255,255,255,0.06);\"><td style=\"padding:12px 16px; color:#807d88; font-family:'IBM Plex Mono',monospace; font-size:12px;\">Setup cost<\u002Ftd><td style=\"padding:12px 16px; color:#7fc99a;\">Trivial<\u002Ftd><td style=\"padding:12px 16px; color:#c77;\">Painful (SDP/ICE)<\u002Ftd><td style=\"padding:12px 16px;\">Moderate<\u002Ftd><\u002Ftr>\n              <tr style=\"border-top:1px solid rgba(255,255,255,0.06);\"><td style=\"padding:12px 16px; color:#807d88; font-family:'IBM Plex Mono',monospace; font-size:12px;\">Browser support<\u002Ftd><td style=\"padding:12px 16px; color:#7fc99a;\">Universal<\u002Ftd><td style=\"padding:12px 16px;\">Universal<\u002Ftd><td style=\"padding:12px 16px;\">Modern (no Safari yet)<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n          <div style=\"background:#161519; border:1px solid rgba(232,118,60,0.28); border-radius:14px; padding:20px;\">\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:16px; color:#f2f0f5; margin-bottom:8px;\">Why WebTransport wins<\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; line-height:1.65; color:#a8a5b0;\">UDP-like <strong style=\"color:#cdcad4;font-weight:600;\">datagrams<\u002Fstrong> for snapshots (drop the stale ones), plus <strong style=\"color:#cdcad4;font-weight:600;\">reliable streams<\u002Fstrong> for events like kills and chat — over a single QUIC connection. No SDP/ICE dance like WebRTC. It's purpose-built for exactly this.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\">\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:16px; color:#f2f0f5; margin-bottom:8px;\">The pragmatic MVP<\u002Fdiv>\n            <p style=\"margin:0; font-size:14px; line-height:1.65; color:#a8a5b0;\">Abstract the transport behind one interface and <strong style=\"color:#cdcad4;font-weight:600;\">ship WebSocket first<\u002Fstrong>. At a few concurrent matches and {{ tickRate }}Hz it is completely fine. Swap in WebTransport once the gameplay loop is solid — Safari users stay on WS.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 04 NETCODE -->\n      <section id=\"netcode\" data-section=\"netcode\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">04<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Netcode Model<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">Four techniques that make 60ms feel like zero<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 30px;\">This is the canonical Valve/Quake model adapted for the browser. Each technique solves one specific symptom of latency.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:30px;\">\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:8px;\">YOUR PLAYER<\u002Fdiv><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">Client-side prediction<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.65; color:#a09da8;\">Apply your own input the instant you press it — don't wait for the server. Movement feels 1:1 because you're rendering your own best guess immediately.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:8px;\">YOUR PLAYER<\u002Fdiv><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">Server reconciliation<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.65; color:#a09da8;\">The server's snapshot is truth. On arrival, snap to it and <em style=\"color:#cdcad4;font-style:normal;\">replay<\u002Fem> every input the server hasn't acked yet. Mispredictions self-correct invisibly.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c); margin-bottom:8px;\">OTHER PLAYERS<\u002Fdiv><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">Entity interpolation<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.65; color:#a09da8;\">Render everyone else ~100ms in the past, smoothly blending between buffered snapshots. Trades a sliver of \"freshness\" for motion with zero stutter.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c); margin-bottom:8px;\">HIT REGISTRATION<\u002Fdiv><div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:17px; color:#f2f0f5; margin-bottom:8px;\">Lag compensation<\u002Fdiv><p style=\"margin:0; font-size:14px; line-height:1.65; color:#a09da8;\">When you fire, the server <em style=\"color:#cdcad4;font-style:normal;\">rewinds<\u002Fem> every hitbox to where it was on your screen at trigger-time, then checks the ray. You hit what you aimed at.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- timeline -->\n        <div style=\"background:#101015; border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:22px 24px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#807d88; margin-bottom:18px;\">Lifecycle of one input → one frame<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex-shrink:0; width:70px; padding:4px 0; text-align:center; border-radius:6px; background:rgba(63,176,191,0.14); border:1px solid rgba(63,176,191,0.3); font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf);\">CLIENT<\u002Fspan><p style=\"margin:0; font-size:14px; line-height:1.55; color:#b9b6c0;\">Sample input, tag it <code style=\"font-family:'IBM Plex Mono',monospace; color:#e9c4ab;\">seq = N<\u002Fcode>, apply locally (predict), render this frame now.<\u002Fp><\u002Fdiv>\n            <div style=\"padding-left:84px; color:#5d5a64; font-size:12px; font-family:'IBM Plex Mono',monospace;\">↓ &nbsp;send InputCmd over the wire &nbsp;(~½ RTT)<\u002Fdiv>\n            <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex-shrink:0; width:70px; padding:4px 0; text-align:center; border-radius:6px; background:rgba(232,118,60,0.14); border:1px solid rgba(232,118,60,0.3); font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">SERVER<\u002Fspan><p style=\"margin:0; font-size:14px; line-height:1.55; color:#b9b6c0;\">Hold in jitter buffer, then on the next tick: validate, simulate, rewind hitboxes for any shots, resolve the world.<\u002Fp><\u002Fdiv>\n            <div style=\"padding-left:84px; color:#5d5a64; font-size:12px; font-family:'IBM Plex Mono',monospace;\">↓ &nbsp;broadcast delta snapshot &nbsp;<code style=\"color:#e9c4ab;\">ack = N<\u002Fcode><\u002Fdiv>\n            <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex-shrink:0; width:70px; padding:4px 0; text-align:center; border-radius:6px; background:rgba(63,176,191,0.14); border:1px solid rgba(63,176,191,0.3); font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf);\">CLIENT<\u002Fspan><p style=\"margin:0; font-size:14px; line-height:1.55; color:#b9b6c0;\">Reconcile your player (replay inputs &gt; N), interpolate everyone else from the snapshot buffer. Repeat ~{{ snapshotRate }}× / second.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 05 TICK LOOP -->\n      <section id=\"tick\" data-section=\"tick\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">05<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Server Tick Loop<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">One fixed-step loop, six stages<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 28px;\">The heart of each match process. Run the simulation at a <strong style=\"color:#e6e4ea;font-weight:600;\">fixed {{ tickRate }} Hz<\u002Fstrong> with an accumulator so it's deterministic regardless of host frame timing, and broadcast snapshots at <strong style=\"color:#e6e4ea;font-weight:600;\">{{ snapshotRate }} Hz<\u002Fstrong> to keep bandwidth down.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px;\">\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:14px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">1 · INGEST<\u002Fspan><p style=\"margin:6px 0 0; font-size:13px; line-height:1.5; color:#a09da8;\">Drain the input jitter buffer for this tick.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:14px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">2 · APPLY<\u002Fspan><p style=\"margin:6px 0 0; font-size:13px; line-height:1.5; color:#a09da8;\">Validate &amp; apply each player's input.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:14px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">3 · INTEGRATE<\u002Fspan><p style=\"margin:6px 0 0; font-size:13px; line-height:1.5; color:#a09da8;\">Step physics &amp; movement by the fixed dt.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:14px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">4 · RESOLVE<\u002Fspan><p style=\"margin:6px 0 0; font-size:13px; line-height:1.5; color:#a09da8;\">Lag-comp rewind + hit registration.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:14px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">5 · SNAPSHOT<\u002Fspan><p style=\"margin:6px 0 0; font-size:13px; line-height:1.5; color:#a09da8;\">Build a per-client delta vs last ack.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:14px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">6 · SEND<\u002Fspan><p style=\"margin:6px 0 0; font-size:13px; line-height:1.5; color:#a09da8;\">Broadcast on the snapshot cadence.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <pre style=\"background:#08070a; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:20px 22px; font-family:'IBM Plex Mono',monospace; font-size:13px; line-height:1.7; color:#cfcdd6; overflow-x:auto; margin:0;\"><span style=\"color:#6b6873;\">// Match process — fixed-step authoritative loop<\u002Fspan>\n<span style=\"color:#c98a6a;\">const<\u002Fspan> DT = 1000 / TICK_HZ;        <span style=\"color:#6b6873;\">// e.g. 1000/{{ tickRate }}<\u002Fspan>\n<span style=\"color:#c98a6a;\">let<\u002Fspan> acc = 0, last = now(), tick = 0;\n\n<span style=\"color:#c98a6a;\">function<\u002Fspan> <span style=\"color:#7fb4d6;\">frame<\u002Fspan>() {\n  <span style=\"color:#c98a6a;\">const<\u002Fspan> t = now(); acc += t - last; last = t;\n  <span style=\"color:#c98a6a;\">while<\u002Fspan> (acc &gt;= DT) { step(DT); acc -= DT; }   <span style=\"color:#6b6873;\">// catch up, never drift<\u002Fspan>\n  setImmediate(frame);                          <span style=\"color:#6b6873;\">// + a precise timer in prod<\u002Fspan>\n}\n\n<span style=\"color:#c98a6a;\">function<\u002Fspan> <span style=\"color:#7fb4d6;\">step<\u002Fspan>(dt) {\n  <span style=\"color:#c98a6a;\">const<\u002Fspan> cmds = drainInputBuffer(tick);          <span style=\"color:#6b6873;\">// 1 ingest<\u002Fspan>\n  <span style=\"color:#c98a6a;\">for<\u002Fspan> (<span style=\"color:#c98a6a;\">const<\u002Fspan> p <span style=\"color:#c98a6a;\">of<\u002Fspan> players)\n    applyInput(p, cmds[p.id], dt);              <span style=\"color:#6b6873;\">// 2 validate + apply<\u002Fspan>\n  world.integrate(dt);                          <span style=\"color:#6b6873;\">// 3 physics<\u002Fspan>\n  resolveShots(cmds);                           <span style=\"color:#6b6873;\">// 4 rewind + hitreg<\u002Fspan>\n  <span style=\"color:#c98a6a;\">if<\u002Fspan> (tick % SNAP_EVERY === 0)                   <span style=\"color:#6b6873;\">// 5 + 6 @ {{ snapshotRate }}Hz<\u002Fspan>\n    <span style=\"color:#c98a6a;\">for<\u002Fspan> (<span style=\"color:#c98a6a;\">const<\u002Fspan> p <span style=\"color:#c98a6a;\">of<\u002Fspan> players) send(p, buildDelta(p));\n  tick++;\n}<\u002Fpre>\n      <\u002Fsection>\n\n      <!-- 06 PACKETS -->\n      <section id=\"packets\" data-section=\"packets\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">06<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Packet Design<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">Two packets, bit-packed, never JSON<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 28px;\">In the hot path everything is binary. The client streams tiny input commands up; the server streams delta snapshots down. JSON belongs to matchmaking and lobby calls, never to gameplay.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:22px;\">\n          <div style=\"min-width:0;\">\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf);\">▲ CLIENT → SERVER<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7d7a85;\">every frame · ~10 bytes<\u002Fspan><\u002Fdiv>\n            <pre style=\"background:#08070a; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:16px 18px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; line-height:1.7; color:#cfcdd6; overflow-x:auto; margin:0;\"><span style=\"color:#c98a6a;\">InputCmd<\u002Fspan> {\n  seq:     u16   <span style=\"color:#6b6873;\">// ack / reconcile<\u002Fspan>\n  dtMs:    u8    <span style=\"color:#6b6873;\">// frame delta<\u002Fspan>\n  move:    i8,i8 <span style=\"color:#6b6873;\">// wishdir x,z<\u002Fspan>\n  yaw:     u16   <span style=\"color:#6b6873;\">// quantized<\u002Fspan>\n  pitch:   i16\n  buttons: u8    <span style=\"color:#6b6873;\">// fire/jump/…<\u002Fspan>\n  fireTick:u32?  <span style=\"color:#6b6873;\">// for lag comp<\u002Fspan>\n}<\u002Fpre>\n          <\u002Fdiv>\n          <div style=\"min-width:0;\">\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c);\">▼ SERVER → CLIENT<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7d7a85;\">{{ snapshotRate }}Hz · delta only<\u002Fspan><\u002Fdiv>\n            <pre style=\"background:#08070a; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:16px 18px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; line-height:1.7; color:#cfcdd6; overflow-x:auto; margin:0;\"><span style=\"color:#c98a6a;\">Snapshot<\u002Fspan> {\n  tick:   u32\n  ackSeq: u16    <span style=\"color:#6b6873;\">// your last input<\u002Fspan>\n  ents: [ {\n    id, flags     <span style=\"color:#6b6873;\">// changed bits<\u002Fspan>\n    pos?, vel?    <span style=\"color:#6b6873;\">// only if moved<\u002Fspan>\n    yaw?, hp?, state?\n  } ]\n  events: [ hit, kill, spawn ] <span style=\"color:#6b6873;\">// reliable<\u002Fspan>\n}<\u002Fpre>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px 20px;\">\n          <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:#f2f0f5; margin-bottom:8px;\">Delta compression keeps it tiny<\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.65; color:#a8a5b0;\">Each snapshot only carries fields that changed since the client's last acknowledged tick, bit-packed with quantized floats. For 10 players that's a few KB/s each — well within a hobby VPS's budget. Send unreliably (datagrams): a dropped snapshot is simply replaced by the next one ~{{ snapshotRate }}ms later, while events ride a reliable stream.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 07 ANTI-CHEAT -->\n      <section id=\"anticheat\" data-section=\"anticheat\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">07<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Anti-Cheat<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">Authority is the anti-cheat<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 28px;\">Because the client only sends <em style=\"color:#cdcad4;font-style:normal;\">intent<\u002Fem> and the server owns all state, most cheats are structurally impossible — there's no client-reported position or health to forge. Every tick the server enforces:<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:9px; margin-bottom:24px;\">\n          <div style=\"display:flex; gap:12px; align-items:center; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:13px 16px;\"><span style=\"color:var(--accent,#e8763c); font-family:'IBM Plex Mono',monospace; font-size:13px;\">✓<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb;\"><strong style=\"color:#eceaf0;font-weight:600;\">Movement bounds<\u002Fstrong> — clamp to max speed, reject teleports and out-of-collision positions.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:center; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:13px 16px;\"><span style=\"color:var(--accent,#e8763c); font-family:'IBM Plex Mono',monospace; font-size:13px;\">✓<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb;\"><strong style=\"color:#eceaf0;font-weight:600;\">Fire-rate &amp; ammo<\u002Fstrong> — enforce weapon cooldowns and magazine counts server-side; ignore extra fire events.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:center; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:13px 16px;\"><span style=\"color:var(--accent,#e8763c); font-family:'IBM Plex Mono',monospace; font-size:13px;\">✓<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb;\"><strong style=\"color:#eceaf0;font-weight:600;\">Line-of-sight on hits<\u002Fstrong> — the rewound ray must actually reach the target; no shooting through walls.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px; align-items:center; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:13px 16px;\"><span style=\"color:var(--accent,#e8763c); font-family:'IBM Plex Mono',monospace; font-size:13px;\">✓<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb;\"><strong style=\"color:#eceaf0;font-weight:600;\">Input rate limiting<\u002Fstrong> — drop floods, reject inputs with impossible timestamps or sequence gaps.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15px; line-height:1.7; color:#9a97a3; max-width:64ch; margin:0; padding-left:16px; border-left:2px solid var(--accent,#e8763c);\"><strong style=\"color:#cdcad4;font-weight:600;\">The honest limit:<\u002Fstrong> aimbots and wallhacks read what the client legitimately renders, so authority alone can't stop them. That's a later layer — server-side behavioral telemetry (impossible flick/accuracy stats) and culling data the player can't yet see. Not needed at hobby scale; just don't architect it out.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 08 LIFECYCLE -->\n      <section id=\"lifecycle\" data-section=\"lifecycle\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">08<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Match Lifecycle<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">A match is an ephemeral process<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 30px;\">The Match Manager spawns a fresh game-server process when 10 players are matched, hands them its address, and reaps it when the match ends. State lives and dies with the process.<\u002Fp>\n\n        <div style=\"display:flex; flex-wrap:wrap; align-items:stretch; gap:0; margin-bottom:8px;\">\n          <div style=\"flex:1; min-width:120px; background:#141318; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px 14px; text-align:center;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:6px;\">ALLOC<\u002Fdiv><div style=\"font-size:13px; color:#c4c1cb; line-height:1.4;\">spawn process, assign port<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:var(--accent,#e8763c); font-size:18px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1; min-width:120px; background:#141318; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px 14px; text-align:center;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent2,#3fb0bf); margin-bottom:6px;\">WARMUP<\u002Fdiv><div style=\"font-size:13px; color:#c4c1cb; line-height:1.4;\">players connect &amp; load<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:var(--accent,#e8763c); font-size:18px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1.3; min-width:140px; background:rgba(232,118,60,0.08); border:1px solid rgba(232,118,60,0.35); border-radius:12px; padding:16px 14px; text-align:center;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--accent,#e8763c); margin-bottom:6px;\">LIVE ⟲ ROUNDS<\u002Fdiv><div style=\"font-size:13px; color:#e9c4ab; line-height:1.4;\">tick loop runs, rounds loop<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:var(--accent,#e8763c); font-size:18px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1; min-width:120px; background:#141318; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px 14px; text-align:center;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9a97a3; margin-bottom:6px;\">END<\u002Fdiv><div style=\"font-size:13px; color:#c4c1cb; line-height:1.4;\">tally, write stats<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; color:var(--accent,#e8763c); font-size:18px; padding:0 6px;\">→<\u002Fdiv>\n          <div style=\"flex:1; min-width:120px; background:#141318; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px 14px; text-align:center;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9a97a3; margin-bottom:6px;\">TEARDOWN<\u002Fdiv><div style=\"font-size:13px; color:#c4c1cb; line-height:1.4;\">process exits, port freed<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15px; line-height:1.7; color:#9a97a3; max-width:64ch; margin:20px 0 0;\">Ephemeral processes mean zero state cleanup bugs and trivially safe restarts — a wedged match never poisons the next one. The Match Manager just watches a port range and respawns on demand.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- 09 STACK -->\n      <section id=\"stack\" data-section=\"stack\" style=\"padding-bottom:96px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">09<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Tech Stack<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">Node + TypeScript, for one decisive reason<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 28px;\">Client prediction and server authority must run the <em style=\"color:#cdcad4;font-style:normal;\">exact same simulation<\u002Fem>, or every step you take mispredicts. Writing both in TypeScript lets you literally share the movement &amp; collision module between browser and server — that prediction parity is worth more than raw runtime speed at this scale.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:24px;\">\n          <div style=\"display:flex; gap:16px; align-items:baseline; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:15px 18px;\"><span style=\"flex-shrink:0; width:130px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent,#e8763c);\">Game server<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb; line-height:1.5;\"><strong style=\"color:#eceaf0;font-weight:600;\">Node.js + TypeScript.<\u002Fstrong> Shared deterministic sim with the client. Go is the upgrade if you later need higher tick rates or many players per box.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; align-items:baseline; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:15px 18px;\"><span style=\"flex-shrink:0; width:130px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent,#e8763c);\">Transport<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb; line-height:1.5;\"><code style=\"font-family:'IBM Plex Mono',monospace; color:#e9c4ab;\">@fails-components/webtransport<\u002Fcode> for QUIC, <code style=\"font-family:'IBM Plex Mono',monospace; color:#e9c4ab;\">ws<\u002Fcode> for the WebSocket fallback — behind one interface.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; align-items:baseline; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:15px 18px;\"><span style=\"flex-shrink:0; width:130px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent,#e8763c);\">Serialization<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb; line-height:1.5;\">Custom bit-packing or FlatBuffers in the hot path. JSON only for lobby/matchmaking REST.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:16px; align-items:baseline; background:#141318; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:15px 18px;\"><span style=\"flex-shrink:0; width:130px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent,#e8763c);\">State / infra<\u002Fspan><span style=\"font-size:14.5px; color:#c4c1cb; line-height:1.5;\">Redis for sessions, presence &amp; the matchmaking queue. Postgres for accounts &amp; stats — add it only when you need persistence.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px 20px;\">\n          <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:15px; color:#f2f0f5; margin-bottom:8px;\">The one caveat: garbage collection<\u002Fdiv>\n          <p style=\"margin:0; font-size:14px; line-height:1.65; color:#a8a5b0;\">A GC pause can cause a tick hiccup. At {{ tickRate }}Hz with a few matches per box it's a non-issue if you pool objects and avoid per-tick allocation. If you ever push to 60–128Hz competitive play, that's the moment to port the sim to Go or Rust — the network model above doesn't change.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- 10 DEPLOY -->\n      <section id=\"deploy\" data-section=\"deploy\" style=\"padding-bottom:60px; scroll-margin-top:36px;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c);\">10<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#807d88;\">Deploy &amp; Scale<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.01em; color:#f4f2f7; margin:0 0 18px; line-height:1.1;\">One box now, a fleet later<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.75; color:#b9b6c0; max-width:64ch; margin:0 0 30px;\">Start cheap. The room model means scaling is just \"run the same process on more machines\" — so the small setup and the big setup share identical game-server code.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:30px;\">\n          <div style=\"background:#161519; border:1px solid rgba(232,118,60,0.3); border-radius:16px; padding:22px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; color:var(--accent,#e8763c); margin-bottom:14px;\">▮ NOW · HOBBY<\u002Fdiv>\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:18px; color:#f2f0f5; margin-bottom:12px;\">A single VPS, Dockerized<\u002Fdiv>\n            <ul style=\"margin:0; padding-left:18px; font-size:14px; line-height:1.8; color:#a8a5b0;\">\n              <li>One 4-vCPU VPS, everything in Docker Compose<\u002Fli>\n              <li>Match Manager + N game-server processes<\u002Fli>\n              <li>Caddy/nginx for TLS + WebSocket; open a UDP port range for WebTransport<\u002Fli>\n              <li>One Redis container<\u002Fli>\n              <li><span style=\"color:#cdcad4;\">≈ $20–40 / month<\u002Fspan>, handles several concurrent matches<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div style=\"background:#141318; border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:22px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; color:var(--accent2,#3fb0bf); margin-bottom:14px;\">◇ LATER · SCALE<\u002Fdiv>\n            <div style=\"font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:18px; color:#f2f0f5; margin-bottom:12px;\">A fleet orchestrator<\u002Fdiv>\n            <ul style=\"margin:0; padding-left:18px; font-size:14px; line-height:1.8; color:#a8a5b0;\">\n              <li>Agones on Kubernetes, or managed Hathora / Edgegap<\u002Fli>\n              <li>Allocation API + autoscaling + multi-region for low ping<\u002Fli>\n              <li>Dedicated matchmaker service &amp; Postgres for accounts<\u002Fli>\n              <li><span style=\"color:#cdcad4;\">The game-server process is unchanged<\u002Fspan> — only allocation moves<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#101015; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:24px 26px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent,#e8763c); margin-bottom:16px;\">Build order — what to ship first<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n            <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:14px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c); margin-bottom:6px;\">01<\u002Fdiv><div style=\"font-size:13.5px; color:#c4c1cb; line-height:1.5;\">WebSocket room + fixed-tick loop. One player moving, server-authoritative.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:14px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c); margin-bottom:6px;\">02<\u002Fdiv><div style=\"font-size:13.5px; color:#c4c1cb; line-height:1.5;\">Client prediction + reconciliation for your own player.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:14px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c); margin-bottom:6px;\">03<\u002Fdiv><div style=\"font-size:13.5px; color:#c4c1cb; line-height:1.5;\">Entity interpolation for everyone else.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:14px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c); margin-bottom:6px;\">04<\u002Fdiv><div style=\"font-size:13.5px; color:#c4c1cb; line-height:1.5;\">Lag-compensated hit registration + shooting.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:14px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c); margin-bottom:6px;\">05<\u002Fdiv><div style=\"font-size:13.5px; color:#c4c1cb; line-height:1.5;\">Swap transport to WebTransport; keep WS fallback.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#161519; border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:14px;\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#e8763c); margin-bottom:6px;\">06<\u002Fdiv><div style=\"font-size:13.5px; color:#c4c1cb; line-height:1.5;\">Match Manager + matchmaking queue → full 5v5.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#e8763c&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#e8763c&quot;, &quot;#46b06a&quot;, &quot;#5b8def&quot;, &quot;#c14d6b&quot;] },\n  &quot;tickRate&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 30, &quot;min&quot;: 20, &quot;max&quot;: 64, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;snapshotRate&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 20, &quot;min&quot;: 10, &quot;max&quot;: 30, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      setRoot: (el) => { this.root = el; },\n      accent: this.props.accentColor ?? '#e8763c',\n      accent2: '#3fb0bf',\n      tickRate: this.props.tickRate ?? 30,\n      snapshotRate: this.props.snapshotRate ?? 20,\n    };\n  }\n\n  componentDidMount() {\n    this.onScroll = () => this.updateActive();\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n    // settle after fonts/layout\n    setTimeout(() => this.updateActive(), 80);\n  }\n\n  componentWillUnmount() {\n    if (this.onScroll) window.removeEventListener('scroll', this.onScroll);\n  }\n\n  componentDidUpdate() { this.updateActive(); }\n\n  updateActive() {\n    if (!this.root) return;\n    const sections = [...this.root.querySelectorAll('[data-section]')];\n    if (!sections.length) return;\n    let active = sections[0].getAttribute('data-section');\n    for (const s of sections) {\n      if (s.getBoundingClientRect().top <= 140) {\n        active = s.getAttribute('data-section');\n      }\n    }\n    const links = this.root.querySelectorAll('[data-nav]');\n    links.forEach((a) => {\n      const on = a.getAttribute('data-nav') === active;\n      a.style.color = on ? '#f3f1f6' : '#8e8b96';\n      a.style.background = on ? 'rgba(232,118,60,0.10)' : 'transparent';\n      a.style.borderLeftColor = on ? 'var(--accent, #e8763c)' : 'transparent';\n      const num = a.querySelector('[data-num]');\n      if (num) num.style.color = on ? 'var(--accent, #e8763c)' : '#5d5a64';\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
